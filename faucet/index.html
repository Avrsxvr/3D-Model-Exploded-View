<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exploded View — Professional 3D</title>
    <meta name="description"
        content="Interactive professional 3D exploded view with animated part breakdown and technical annotations." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Canvas -->
    <canvas id="webgl-canvas" class="webgl"></canvas>

    <!-- Bottom Control Bar -->
    <div class="control-bar" id="control-bar">
        <div class="control-bar-inner">
            <!-- Explosion Slider -->
            <div class="control-group">
                <label class="control-label">EXPLOSION</label>
                <div class="slider-track-wrap">
                    <div class="slider-track-fill" id="slider-fill"></div>
                    <input type="range" id="explosion-slider" class="explosion-slider" min="0" max="100" value="0"
                        step="1" />
                </div>
                <span class="slider-value" id="slider-value-display">0%</span>
            </div>

            <!-- Divider -->
            <div class="control-divider"></div>

            <!-- Action Buttons -->
            <div class="control-group">
                <label class="control-label">ANIMATION</label>
                <div class="btn-row">
                    <button class="ctrl-btn primary" id="btn-explode">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        Explode
                    </button>
                    <button class="ctrl-btn" id="btn-reset">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="1 4 1 10 7 10" />
                            <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                        </svg>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Divider -->
            <div class="control-divider"></div>

            <!-- View Controls -->
            <div class="control-group">
                <label class="control-label">VIEW</label>
                <div class="btn-row">
                    <button class="ctrl-btn" id="btn-labels" title="Toggle Labels">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
                            <line x1="7" y1="7" x2="7.01" y2="7" />
                        </svg>
                        Labels
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Labels Container (SVG overlay for leader lines) -->
    <svg id="labels-svg" class="labels-svg" pointer-events="none"></svg>


    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">⬡</div>
            <div class="loading-title">EXPLODED VIEW</div>
            <div class="loading-bar-wrap">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <div class="loading-text" id="loading-text">Initializing 3D Engine...</div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploded View — Interactive 3D</title>
  <meta name="description" content="Premium interactive 3D exploded views for luxury bathroom fixtures.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #b38e5d;
      --cyan: #0077aa;
      --bg: #d2d2d2;
    }

    body {
      background: var(--bg);
      color: #1a1a1a;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 24px;
    }

    /* Ambient background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.18;
    }

    .orb-1 {
      width: clamp(300px, 50vw, 650px);
      height: clamp(300px, 50vw, 650px);
      background: radial-gradient(circle, var(--cyan), transparent 70%);
      top: -10%;
      left: -5%;
      animation: drift1 22s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: clamp(250px, 40vw, 500px);
      height: clamp(250px, 40vw, 500px);
      background: radial-gradient(circle, var(--gold), transparent 70%);
      bottom: -10%;
      right: -5%;
      animation: drift2 28s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(40px, 40px);
      }
    }

    @keyframes drift2 {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(-40px, -40px);
      }
    }

    /* Grid */
    .grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    /* Hero text */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 700px;
      padding: 0 24px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.25);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
      animation: fadeInDown 0.8s ease-out both;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #111111 0%, #444444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInDown 0.8s ease-out 0.1s both;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.65);
      letter-spacing: 0.02em;
      line-height: 1.6;
      margin-bottom: 52px;
      animation: fadeInDown 0.8s ease-out 0.2s both;
    }

    /* Product cards */
    .cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.9s ease-out 0.35s both;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      padding: 32px;
      width: 100%;
      max-width: 280px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }

    .card-faucet {
      --card-color: rgba(0, 119, 170, 0.3);
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      border-color: var(--card-color);
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 20px;
      color: var(--cyan);
      transition: transform 0.4s ease;
    }

    .card:hover .card-icon {
      transform: scale(1.1) rotate(10deg);
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 40px;
      background: var(--cyan);
      color: white;
      transition: background 0.3s ease;
    }

    .card:hover .card-tag {
      background: #005f88;
    }

    @media (max-width: 480px) {
      body {
        padding: 40px 16px;
      }

      .card {
        max-width: 100%;
      }

      .hero {
        padding: 0;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <section class="hero">
    <div class="badge">✦ Interactive 3D Platform</div>
    <h1>Exploded View<br>System</h1>
    <p class="subtitle">Explore every component of luxury bathroom fixtures through immersive 3D exploded views.</p>

    <div class="cards">
      <!-- Faucet Card -->
      <a href="/faucet/" class="card card-faucet">
        <div class="card-icon">⬡</div>
        <div class="card-name">Faucet</div>
        <div class="card-desc">Rose gold luxury faucet with 19 professional annotated components.</div>
        <span class="card-tag">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          Launch
        </span>
      </a>

    </div>
  </section>
</body>

</html>
